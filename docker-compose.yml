version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: gamtech_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gamtech_local
      MYSQL_USER: gamtech
      MYSQL_PASSWORD: gamtech
    volumes:
      - db_data:/var/lib/mysql
      # Drop a .sql dump file in ./docker/db-init/ to auto-import on first run
      - ./docker/db-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  wordpress:
    image: php:8.2-apache
    container_name: gamtech_wordpress
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: gamtech_local
      WORDPRESS_DB_USER: gamtech
      WORDPRESS_DB_PASSWORD: gamtech
    volumes:
      # Mount the entire WordPress project into the container
      - .:/var/www/html
      # Use the local wp-config for Docker (not the production one)
      - ./docker/wp-config.local.php:/var/www/html/wp-config.php
    ports:
      - "8080:80"
    # Enable mod_rewrite for WordPress permalinks
    command: bash -c "a2enmod rewrite && apache2-foreground"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gamtech_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: gamtech
      PMA_PASSWORD: gamtech
    ports:
      - "8081:80"

volumes:
  db_data:
